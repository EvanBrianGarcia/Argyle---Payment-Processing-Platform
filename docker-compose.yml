services:
  postgres:
    image: postgres:16-alpine
    container_name: payments-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./backend
      dockerfile: src/PaymentPlatform.Api/Dockerfile
    container_name: payments-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Payments: "Host=postgres;Port=5432;Database=payments;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-5000}:8080"

volumes:
  postgres-data:
