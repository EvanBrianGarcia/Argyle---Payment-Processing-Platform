name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true
      - name: Restore
        working-directory: backend
        run: dotnet restore PaymentPlatform.slnx
      - name: Build
        working-directory: backend
        run: dotnet build PaymentPlatform.slnx --configuration Release --no-restore
      - name: Test
        working-directory: backend
        run: dotnet test PaymentPlatform.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

  frontend:
    name: Frontend (Vite + React)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payments
          POSTGRES_USER: payments
          POSTGRES_PASSWORD: payments
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U payments"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Start backend in background
        working-directory: backend
        env:
          ConnectionStrings__Payments: Host=localhost;Port=5432;Database=payments;Username=payments;Password=payments
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          dotnet run --project src/PaymentPlatform.Api/PaymentPlatform.Api.csproj --no-launch-profile &
          echo $! > /tmp/api.pid
          for i in {1..60}; do
            curl -sf http://localhost:8080/health/ready && break || sleep 2
          done

      - name: Schema drift check
        working-directory: frontend
        run: |
          curl -sf http://localhost:8080/openapi/v1.json -o api/openapi.v1.json.live
          diff -u api/openapi.v1.json api/openapi.v1.json.live || {
            echo "::error::OpenAPI schema drift detected. Run 'pnpm codegen:fetch' from frontend/ and commit the result.";
            exit 1;
          }
          rm api/openapi.v1.json.live

      - name: Typecheck
        working-directory: frontend
        run: pnpm typecheck

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Unit + component tests with coverage
        working-directory: frontend
        run: pnpm test:coverage

      - name: Build
        working-directory: frontend
        run: pnpm build

      - name: Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        working-directory: frontend
        env:
          E2E_API_BASE_URL: http://localhost:8080
          E2E_BEARER_TOKEN: dev-key-mrc-acme
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill $(cat /tmp/api.pid) || true
          fi
